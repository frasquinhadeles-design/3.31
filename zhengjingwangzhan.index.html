<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 - 3D手势粒子系统</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #050505 0%, #000 100%); }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-family: "Microsoft YaHei"; text-align: center; z-index: 100;
        }
        /* 隐藏视频，仅供AI计算 */
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.5); font-family: "Microsoft YaHei"; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="loading">✨ 正在召唤粒子魔法...<br>(首次加载需约5-10秒)</div>
<div id="hint">请对着摄像头张开/握紧手掌</div>
<video id="input-video"></video>
<div id="canvas-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 25000;
    const videoElement = document.getElementById('input-video');
    let targetPositions = [];
    let isExploded = false;

    // 1. 初始化场景
    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 2000);
        camera.position.z = 400;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 创建粒子
        geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for(let i=0; i<particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 600;
            positions[i*3+1] = (Math.random() - 0.5) * 600;
            positions[i*3+2] = (Math.random() - 0.5) * 600;

            colors[i*3] = 0.4; 
            colors[i*3+1] = 0.8; 
            colors[i*3+2] = 1.0; 
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 1.8,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.7
        });

        points = new THREE.Points(geometry, material);
        scene.add(points);
        
        createTextCoords();
        animate();
    }

    // 2. 将文案转为坐标
    function createTextCoords() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 300;
        ctx.fillStyle = "white";
        ctx.font = "bold 70px Microsoft YaHei";
        ctx.textAlign = "center";
        ctx.fillText("祝愿管老师天天开心，生日快乐！", 600, 150);

        const imgData = ctx.getImageData(0,0,1200,300).data;
        const validCoords = [];
        for(let y=0; y<300; y+=2) {
            for(let x=0; x<1200; x+=2) {
                if(imgData[(y*1200+x)*4] > 128) {
                    validCoords.push((x-600)*0.8, (150-y)*0.8, 0);
                }
            }
        }
        for(let i=0; i<particleCount; i++) {
            const idx = (i % (validCoords.length/3)) * 3;
            targetPositions.push(validCoords[idx], validCoords[idx+1], validCoords[idx+2]);
        }
    }

    // 3. 手势处理
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
    hands.onResults(results => {
        document.getElementById('loading').style.display = 'none';
        if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const hl = results.multiHandLandmarks[0];
            const dist = Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y);
            
            // 粒子根据手势张合产生呼吸感
            const s = 1 + dist * 2;
            points.scale.set(s, s, s);

            // 当手掌张开很大，触发重组
            if(dist > 0.25 && !isExploded) {
                isExploded = true;
                morphToText();
            }
        }
    });

    function morphToText() {
        const pos = geometry.attributes.position;
        for(let i=0; i<particleCount; i++) {
            gsap.to(pos.array, {
                [i*3]: targetPositions[i*3],
                [i*3+1]: targetPositions[i*3+1],
                [i*3+2]: targetPositions[i*3+2],
                duration: 2,
                ease: "power3.inOut",
                delay: Math.random() * 0.5,
                onUpdate: () => pos.needsUpdate = true
            });
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.001;
        // 背景微弱闪烁效果
        points.material.size = 1.5 + Math.sin(Date.now()*0.003)*0.5;
        renderer.render(scene, camera);
    }

    const cameraHelper = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    cameraHelper.start();
    init();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
