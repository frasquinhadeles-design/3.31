<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给管老师的生日惊喜</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ff99cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-text { color: #ff99cc; margin-top: 20px; font-family: "Microsoft YaHei"; font-size: 14px; text-align: center; line-height: 1.6; }
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #hint { position: absolute; bottom: 40px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-family: "Microsoft YaHei"; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div id="status-text">正在召唤手势魔法...<br>请确保在网络良好的环境下打开</div>
</div>

<div id="hint">对着摄像头张开手掌触发蛋糕 | 点击屏幕强制触发</div>
<video id="input-video" playsinline></video>
<div id="canvas-container"></div>

<script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
<script src="https://cdn.staticfile.org/gsap/3.9.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 18000;
    let cakePos = [], textPos = [], randomPos = [];
    let state = 'random'; // random, cake, text
    const videoElement = document.getElementById('input-video');

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
        camera.position.z = 400;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 800;
            positions[i*3+1] = (Math.random() - 0.5) * 800;
            positions[i*3+2] = (Math.random() - 0.5) * 800;
            randomPos.push(positions[i*3], positions[i*3+1], positions[i*3+2]);
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2, color: 0xffb3d9, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
        }));
        scene.add(points);

        createCakeCoords();
        createTextCoords();
        animate();
    }

    function createCakeCoords() {
        for(let i=0; i<particleCount; i++) {
            let x, y, z; const r = Math.random();
            if(r < 0.4) { // 底层
                const a = Math.random()*Math.PI*2; const rad = Math.random()*110;
                x = Math.cos(a)*rad; y = Math.random()*60 - 80; z = Math.sin(a)*rad;
            } else if(r < 0.75) { // 上层
                const a = Math.random()*Math.PI*2; const rad = Math.random()*75;
                x = Math.cos(a)*rad; y = Math.random()*50 - 20; z = Math.sin(a)*rad;
            } else if(r < 0.95) { // 蜡烛
                x = (Math.random()-0.5)*10; y = Math.random()*40 + 30; z = (Math.random()-0.5)*10;
            } else { // 火苗
                x = (Math.random()-0.5)*6; y = Math.random()*15 + 70; z = (Math.random()-0.5)*6;
            }
            cakePos.push(x, y, z);
        }
    }

    function createTextCoords() {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
        ctx.fillText("祝管老师生日快乐！", 500, 100);
        const data = ctx.getImageData(0,0,1000,200).data;
        const pts = [];
        for(let y=0; y<200; y+=3) for(let x=0; x<1000; x+=3) {
            if(data[(y*1000+x)*4] > 128) pts.push(x-500, 100-y, 0);
        }
        for(let i=0; i<particleCount; i++) {
            const idx = (i % (pts.length/3)) * 3;
            textPos.push(pts[idx], pts[idx+1], pts[idx+2]);
        }
    }

    function morph(target) {
        const pos = geometry.attributes.position;
        for(let i=0; i<particleCount; i++) {
            gsap.to(pos.array, {
                [i*3]: target[i*3], [i*3+1]: target[i*3+1], [i*3+2]: target[i*3+2],
                duration: 2, ease: "power2.inOut", delay: Math.random()*0.4,
                onUpdate: () => pos.needsUpdate = true
            });
        }
    }

    // 关键优化：手势识别初始化
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

    hands.onResults(results => {
        // 只要开始返回结果，就关闭加载层
        document.getElementById('loading-screen').style.display = 'none';
        if(results.multiHandLandmarks?.length > 0) {
            const hl = results.multiHandLandmarks[0];
            const dist = Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y);
            if(dist > 0.2 && state === 'random') { morph(cakePos); state = 'cake'; }
        }
    });

    // 启动摄像头
    const cameraHelper = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });

    // 兜底逻辑：如果 8 秒后还没加载完，允许点击进入
    setTimeout(() => {
        const loadScreen = document.getElementById('loading-screen');
        if(loadScreen.style.display !== 'none') {
            document.getElementById('status-text').innerHTML = "手势引擎加载略慢...<br>您可以直接点击屏幕开启惊喜 ✨";
            loadScreen.onclick = () => { loadScreen.style.display = 'none'; };
        }
    }, 8000);

    // 点击屏幕作为保底交互
    window.addEventListener('click', () => {
        if(state === 'random') { morph(cakePos); state = 'cake'; }
        else if(state === 'cake') { morph(textPos); state = 'text'; }
    });

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    init();
    cameraHelper.start();
</script>
</body>
</html>
