<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给管老师的生日惊喜 v5.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #status-text { color: #ff99cc; margin-top: 20px; font-family: "Microsoft YaHei"; text-align: center; font-size: 14px; }
        #hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-family: "Microsoft YaHei"; z-index: 50; pointer-events: none; }
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="border: 3px solid #f3f3f3; border-top: 3px solid #ff99cc; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
    <div id="status-text">正在校准粒子坐标...<br>请稍候</div>
</div>
<style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

<div id="hint">手掌张开 或 点击屏幕 切换</div>
<video id="input-video" playsinline></video>

<script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
<script src="https://cdn.staticfile.org/gsap/3.9.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 18000; 
    let stateIndex = 0; 
    const states = [{pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}];

    async function init() {
        scene = new THREE.Scene();
        // 调整摄像机位置，确保视野开阔
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 2000);
        camera.position.z = 500;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        const initialPos = new Float32Array(particleCount * 3);
        const initialCol = new Float32Array(particleCount * 3);

        createRandomData(0); // 星空
        createCakeData(1);   // 蛋糕
        await createPersonData(2); // 人物
        createTextData(3);   // 文字

        for(let i=0; i<particleCount; i++) {
            initialPos[i*3] = states[0].pos[i*3];
            initialPos[i*3+1] = states[0].pos[i*3+1];
            initialPos[i*3+2] = states[0].pos[i*3+2];
            initialCol[i*3] = states[0].col[i*3];
            initialCol[i*3+1] = states[0].col[i*3+1];
            initialCol[i*3+2] = states[0].col[i*3+2];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(initialPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(initialCol, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2.5, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending
        }));
        scene.add(points);

        setupInteraction();
        animate();
    }

    function createRandomData(idx) {
        for(let i=0; i<particleCount; i++) {
            states[idx].pos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            states[idx].col.push(0.4, 0.7, 1);
        }
    }

    function createCakeData(idx) {
        for(let i=0; i<particleCount; i++) {
            let x,y,z; const rand = Math.random();
            if(rand < 0.6) {
                const a = Math.random()*Math.PI*2; const rad = Math.random()*110;
                x = Math.cos(a)*rad; y = Math.random()*100-100; z = Math.sin(a)*rad;
            } else {
                x = (Math.random()-0.5)*20; y = Math.random()*80; z = (Math.random()-0.5)*20;
            }
            states[idx].pos.push(x, y, z);
            states[idx].col.push(1, 0.8, 0.9);
        }
    }

    function createPersonData(idx) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "person.jpg"; 

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const sampleSize = 200; 
                canvas.width = sampleSize; canvas.height = sampleSize;
                
                // 自动裁切正方形中心区域
                let minSide = Math.min(img.width, img.height);
                ctx.drawImage(img, (img.width-minSide)/2, (img.height-minSide)/2, minSide, minSide, 0, 0, sampleSize, sampleSize);
                
                const data = ctx.getImageData(0, 0, sampleSize, sampleSize).data;
                const temp = [];
                // 核心：根据屏幕比例调整缩放，防溢出
                const scale = window.innerHeight > window.innerWidth ? 2.2 : 3.0;

                for (let y = 0; y < sampleSize; y++) {
                    for (let x = 0; x < sampleSize; x++) {
                        const i = (y * sampleSize + x) * 4;
                        if (data[i + 3] > 80) { 
                            temp.push({
                                // 强制将粒子坐标中心锚定在 0,0
                                x: (x - sampleSize / 2) * scale, 
                                y: (sampleSize / 2 - y) * scale, 
                                r: data[i]/255, g: data[i+1]/255, b: data[i+2]/255
                            });
                        }
                    }
                }
                for (let i = 0; i < particleCount; i++) {
                    const p = temp[i % temp.length];
                    states[idx].pos.push(p.x, p.y, (Math.random()-0.5)*10);
                    states[idx].col.push(p.r, p.g, p.b);
                }
                resolve();
            };
            img.onerror = () => { createRandomData(idx); resolve(); };
        });
    }

    function createTextData(idx) {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
        ctx.fillText("祝管老师天天开心，生日快乐！", 500, 100);
        const data = ctx.getImageData(0,0,1000,200).data;
        const pts = [];
        for(let y=0; y<200; y+=2) for(let x=0; x<1000; x+=2) {
            if(data[(y*1000+x)*4] > 120) pts.push(x-500, 100-y, 0);
        }
        for(let i=0; i<particleCount; i++) {
            const pidx = (i % (pts.length/3)) * 3;
            states[idx].pos.push(pts[pidx], pts[pidx+1], pts[pidx+2]);
            states[idx].col.push(1, 1, 1);
        }
    }

    function nextStep() {
        stateIndex = (stateIndex + 1) % 4;
        const target = states[stateIndex];
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;

        for(let i=0; i<particleCount; i++) {
            gsap.to(posAttr.array, {
                [i*3]: target.pos[i*3], [i*3+1]: target.pos[i*3+1], [i*3+2]: target.pos[i*3+2],
                duration: 2, ease: "power3.inOut", delay: Math.random()*0.3,
                onUpdate: () => posAttr.needsUpdate = true
            });
            gsap.to(colAttr.array, {
                [i*3]: target.col[i*3], [i*3+1]: target.col[i*3+1], [i*3+2]: target.col[i*3+2],
                duration: 1.5, onUpdate: () => colAttr.needsUpdate = true
            });
        }
    }

    function setupInteraction() {
        window.onclick = nextStep;
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        hands.onResults(res => {
            document.getElementById('loading-screen').style.display = 'none';
            if(res.multiHandLandmarks?.length > 0) {
                const hl = res.multiHandLandmarks[0];
                if(Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y) > 0.25) { 
                    if(!window.isT) { window.isT = true; nextStep(); setTimeout(() => window.isT = false, 3000); }
                }
            }
        });
        new Camera(document.getElementById('input-video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input-video')}); },
            width: 640, height: 480
        }).start();
    }

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
