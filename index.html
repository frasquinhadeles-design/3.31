<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给管老师的生日魔法 v10.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.8s;
        }
        #status-text { color: #ff99cc; margin-top: 20px; font-family: "Microsoft YaHei"; text-align: center; font-size: 14px; }
        #hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-family: "Microsoft YaHei"; z-index: 50; pointer-events: none; }
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="border: 3px solid #f3f3f3; border-top: 3px solid #ff99cc; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite;"></div>
    <div id="status-text">✨ 正在校准 3D 魔法中心...<br>请在 Safari 中点击刷新</div>
</div>
<style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

<div id="hint">张开手掌 或 点击屏幕 开启惊喜</div>
<video id="input-video" playsinline></video>

<script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
<script src="https://cdn.staticfile.org/gsap/3.9.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 20000; // 粒子总数提升
    let stateIndex = 0; 
    const states = [{pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}];

    async function init() {
        scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        camera = new THREE.PerspectiveCamera(60, aspect, 1, 2000);
        camera.position.z = 450; 

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        const initialPos = new Float32Array(particleCount * 3);
        const initialCol = new Float32Array(particleCount * 3);

        createRandomData(0); 
        createCakeData(1);   
        await createPersonData(2); // 核心：高清晰度中心截取
        createTextData(3);   

        for(let i=0; i<particleCount; i++) {
            initialPos[i*3] = states[0].pos[i*3];
            initialPos[i*3+1] = states[0].pos[i*3+1];
            initialPos[i*3+2] = states[0].pos[i*3+2];
            initialCol[i*3] = states[0].col[i*3];
            initialCol[i*3+1] = states[0].col[i*3+1];
            initialCol[i*3+2] = states[0].col[i*3+2];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(initialPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(initialCol, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2.2, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
        }));
        scene.add(points);

        setupInteraction();
        animate();
    }

    function createRandomData(idx) {
        for(let i=0; i<particleCount; i++) {
            states[idx].pos.push((Math.random()-0.5)*900, (Math.random()-0.5)*900, (Math.random()-0.5)*1000);
            states[idx].col.push(0.5, 0.7, 1);
        }
    }

    function createCakeData(idx) {
        for(let i=0; i<particleCount; i++) {
            let x,y,z; const rand = Math.random();
            if(rand < 0.6) {
                const a = Math.random()*Math.PI*2; const rad = Math.random()*110;
                x = Math.cos(a)*rad; y = Math.random()*80-100; z = Math.sin(a)*rad;
                states[idx].col.push(1, 0.8, 0.9);
            } else {
                x = (Math.random()-0.5)*20; y = Math.random()*80; z = (Math.random()-0.5)*20;
                states[idx].col.push(1, 1, 0.4);
            }
            states[idx].pos.push(x, y, z);
        }
    }

    function createPersonData(idx) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "person.jpg"; 

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 1. 高精度正方形采样 (250x250)
                const sampleSize = 250; 
                canvas.width = sampleSize;
                canvas.height = sampleSize;
                
                // 2. 核心：中心裁切算法
                // 无论原图多长，只截取最中间的正方形（包含皇冠和脸）
                let minSide = Math.min(img.width, img.height);
                let sx = (img.width - minSide) / 2;
                let sy = (img.height - minSide) / 2;
                ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, sampleSize, sampleSize);
                
                const imageData = ctx.getImageData(0, 0, sampleSize, sampleSize).data;
                const temp = [];
                // 3. 放大系数设为 2.8，确保人像占比极大
                const scale = 2.8; 

                for (let y = 0; y < sampleSize; y++) {
                    for (let x = 0; x < sampleSize; x++) {
                        const i = (y * sampleSize + x) * 4;
                        if (imageData[i + 3] > 60) { 
                            temp.push({
                                x: (x - sampleSize / 2) * scale, 
                                // 垂直中心校正，向下微调 20 确保头部不被刘海遮挡
                                y: (sampleSize / 2 - y) * scale - 20, 
                                r: imageData[i] / 255, 
                                g: imageData[i + 1] / 255, 
                                b: imageData[i + 2] / 255
                            });
                        }
                    }
                }

                for (let i = 0; i < particleCount; i++) {
                    const p = temp[i % temp.length];
                    states[idx].pos.push(p.x, p.y, (Math.random() - 0.5) * 6);
                    states[idx].col.push(p.r, p.g, p.b);
                }
                resolve();
            };
            img.onerror = () => { createRandomData(idx); resolve(); };
        });
    }

    function createTextData(idx) {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 60px 'Microsoft YaHei', Arial"; ctx.textAlign = "center";
        ctx.fillText("祝管老师天天开心，生日快乐！", 500, 100);
        const data = ctx.getImageData(0,0,1000,200).data;
        const pts = [];
        for(let y=0; y<200; y+=2) for(let x=0; x<1000; x+=2) {
            if(data[(y*1000+x)*4] > 120) pts.push(x-500, 100-y, 0);
        }
        for(let i=0; i<particleCount; i++) {
            const pidx = (i % (pts.length/3)) * 3;
            states[idx].pos.push(pts[pidx], pts[pidx+1], pts[pidx+2]);
            states[idx].col.push(1, 1, 1);
        }
    }

    function nextStep() {
        stateIndex = (stateIndex + 1) % 4;
        const target = states[stateIndex];
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;

        for(let i=0; i<particleCount; i++) {
            gsap.to(posAttr.array, {
                [i*3]: target.pos[i*3], [i*3+1]: target.pos[i*3+1], [i*3+2]: target.pos[i*3+2],
                duration: 2.2, ease: "expo.out", delay: Math.random()*0.3,
                onUpdate: () => posAttr.needsUpdate = true
            });
            gsap.to(colAttr.array, {
                [i*3]: target.col[i*3], [i*3+1]: target.col[i*3+1], [i*3+2]: target.col[i*3+2],
                duration: 1.5, onUpdate: () => colAttr.needsUpdate = true
            });
        }
    }

    function setupInteraction() {
        window.addEventListener('click', nextStep);
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        hands.onResults(res => {
            const ls = document.getElementById('loading-screen');
            if(ls) { ls.style.opacity = 0; setTimeout(()=>ls.remove(), 800); }
            if(res.multiHandLandmarks?.length > 0) {
                const hl = res.multiHandLandmarks[0];
                if(Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y) > 0.25 && !window.isT) { 
                    window.isT = true; nextStep(); setTimeout(() => window.isT = false, 3000); 
                }
            }
        });
        const cam = new Camera(document.getElementById('input-video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input-video')}); },
            width: 640, height: 480
        });
        cam.start();
    }
    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
