<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管老师生日快乐</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #status-text { color: #ff99cc; margin-top: 20px; font-family: "Microsoft YaHei", sans-serif; text-align: center; font-size: 14px; }
        #hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-family: "Microsoft YaHei"; z-index: 50; pointer-events: none; }
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loading-screen" onclick="this.style.display='none'">
    <div style="border: 3px solid #333; border-top: 3px solid #ff99cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <div id="status-text">✨ 正在校准 3:4 魔法比例...<br>若长时间未进入，请点击屏幕</div>
</div>
<style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

<div id="hint">张开手掌触发魔法 | 或点击屏幕</div>
<video id="input-video" playsinline muted autoplay></video>

<script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
<script src="https://cdn.staticfile.org/gsap/3.9.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 20000; 
    let stateIndex = 0; 
    const states = [{pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}];

    async function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 2000);
        camera.position.z = 500;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        
        // --- 数据生成 ---
        createStarData(0); 
        createLuxCakeData(1);   
        await loadPerson34(2); 
        createGradientText(3);   

        const initialPos = new Float32Array(states[0].pos);
        const initialCol = new Float32Array(states[0].col);
        geometry.setAttribute('position', new THREE.BufferAttribute(initialPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(initialCol, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2.5, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
        }));
        scene.add(points);

        setupInteraction();
        animate();
        document.getElementById('loading-screen').style.display = 'none';
    }

    // 0. 星空
    function createStarData(idx) {
        for(let i=0; i<particleCount; i++) {
            states[idx].pos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            states[idx].col.push(0.4, 0.7, 1);
        }
    }

    // 1. 豪华双层蛋糕
    function createLuxCakeData(idx) {
        for(let i=0; i<particleCount; i++) {
            let x,y,z, r,g,b; const rand = Math.random();
            if(rand < 0.45) { // 底层奶油
                const a = Math.random()*Math.PI*2; const rad = Math.random()*120;
                x = Math.cos(a)*rad; y = Math.random()*50-100; z = Math.sin(a)*rad;
                r=0.95; g=0.95; b=0.98;
            } else if(rand < 0.75) { // 上层粉色
                const a = Math.random()*Math.PI*2; const rad = Math.random()*80;
                x = Math.cos(a)*rad; y = Math.random()*45-45; z = Math.sin(a)*rad;
                r=1; g=0.75; b=0.85;
            } else { // 蜡烛与火苗
                x = (Math.random()-0.5)*15; y = Math.random()*80+10; z = (Math.random()-0.5)*15;
                r=1; g=0.6; b=0.2;
            }
            states[idx].pos.push(x, y, z); states[idx].col.push(r, g, b);
        }
    }

    // 2. [核心修正] 3:4 比例人物截取与坐标修复
    function loadPerson34(idx) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "person.jpg?v=" + Math.random();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                // 强制 Canvas 比例为 3:4
                canvas.width = 150; canvas.height = 200;
                
                // 智能裁切：从原图中心截取 3:4 区域
                let iw = img.width, ih = img.height;
                let cropW, cropH;
                if (iw / ih > 0.75) {
                    cropH = ih; cropW = ih * 0.75;
                } else {
                    cropW = iw; cropH = iw * (4/3);
                }
                ctx.drawImage(img, (iw-cropW)/2, (ih-cropH)/2, cropW, cropH, 0, 0, 150, 200);
                
                const data = ctx.getImageData(0, 0, 150, 200).data;
                const temp = [];
                // 增加 scale 以占满手机屏幕高度
                const scale = 2.8; 

                for (let y = 0; y < 200; y++) {
                    for (let x = 0; x < 150; x++) {
                        const i = (y * 150 + x) * 4;
                        if (data[i + 3] > 60) {
                            temp.push({
                                x: (x - 75) * scale, 
                                y: (100 - y) * scale - 20, // 修正 Y 轴，中心点稍微下移
                                r: data[i]/255, g: data[i+1]/255, b: data[i+2]/255
                            });
                        }
                    }
                }
                for (let i = 0; i < particleCount; i++) {
                    const p = temp[i % temp.length];
                    states[idx].pos.push(p.x, p.y, (Math.random()-0.5)*10);
                    states[idx].col.push(p.r, p.g, p.b);
                }
                resolve();
            };
            img.onerror = () => { createStarData(idx); resolve(); };
        });
    }

    // 3. 蓝粉渐变文字 (修正过长问题)
    function createGradientText(idx) {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 65px Arial"; ctx.textAlign = "center";
        // 仅保留一句话
        ctx.fillText("管老师，生日快乐", 400, 110);
        const data = ctx.getImageData(0,0,800,200).data;
        const pts = [];
        for(let y=0; y<200; y+=2) for(let x=0; x<800; x+=2) {
            if(data[(y*800+x)*4] > 120) pts.push({x: x-400, y: 100-y});
        }
        for(let i=0; i<particleCount; i++) {
            const p = pts[i % pts.length];
            states[idx].pos.push(p.x * 1.2, p.y * 1.2, 0);
            // 蓝粉渐变效果
            const mix = (p.x + 300) / 600;
            states[idx].col.push(0.4 + mix * 0.6, 0.6, 0.9 - mix * 0.2); 
        }
    }

    function nextStep() {
        stateIndex = (stateIndex + 1) % 4;
        const target = states[stateIndex];
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;
        for(let i=0; i<particleCount; i++) {
            gsap.to(posAttr.array, {
                [i*3]: target.pos[i*3], [i*3+1]: target.pos[i*3+1], [i*3+2]: target.pos[i*3+2],
                duration: 2, ease: "power2.inOut", delay: Math.random()*0.3,
                onUpdate: () => posAttr.needsUpdate = true
            });
            gsap.to(colAttr.array, {
                [i*3]: target.col[i*3], [i*3+1]: target.col[i*3+1], [i*3+2]: target.col[i*3+2],
                duration: 1.5, onUpdate: () => colAttr.needsUpdate = true
            });
        }
    }

    function setupInteraction() {
        window.addEventListener('click', nextStep);
        // 手势识别优化：增加视频播放保障
        const videoElement = document.getElementById('input-video');
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        
        hands.onResults(res => {
            if(res.multiHandLandmarks?.length > 0) {
                const hl = res.multiHandLandmarks[0];
                const dist = Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y);
                if(dist > 0.3 && !window.isT) {
                    window.isT = true; nextStep(); setTimeout(() => window.isT = false, 3000);
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start().catch(() => console.log("请允许摄像头权限以开启手势感应"));
    }

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
