<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管老师生日快乐</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #status-text { color: #ff99cc; margin-top: 20px; font-family: "Microsoft YaHei", sans-serif; text-align: center; font-size: 14px; }
        #hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-family: "Microsoft YaHei"; z-index: 50; pointer-events: none; }
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loading-screen" onclick="forceHide()">
    <div style="border: 3px solid #333; border-top: 3px solid #ff99cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <div id="status-text">✨ 正在点燃星空...<br>若长时间未进入，请点击屏幕</div>
</div>
<style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

<div id="hint">点点屏幕 或 挥挥手掌 开启魔法</div>
<video id="input-video" playsinline></video>

<script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
<script src="https://cdn.staticfile.org/gsap/3.9.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 18000; 
    let stateIndex = 0; 
    const states = [{pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}];

    function forceHide() {
        const ls = document.getElementById('loading-screen');
        if(ls) ls.style.display = 'none';
    }

    // 1. 先把能生成的静态数据生成
    function createStarData(idx) {
        for(let i=0; i<particleCount; i++) {
            states[idx].pos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            states[idx].col.push(0.5, 0.7, 1);
        }
    }

    function createCakeData(idx) {
        for(let i=0; i<particleCount; i++) {
            let x,y,z, r,g,b; const rand = Math.random();
            if(rand < 0.4) { 
                const a = Math.random()*Math.PI*2; const rad = Math.random()*110;
                x = Math.cos(a)*rad; y = Math.random()*50-100; z = Math.sin(a)*rad;
                r=0.98; g=0.95; b=0.98;
            } else if(rand < 0.7) { 
                const a = Math.random()*Math.PI*2; const rad = Math.random()*80;
                x = Math.cos(a)*rad; y = Math.random()*45-45; z = Math.sin(a)*rad;
                r=1; g=0.7; b=0.8;
            } else { 
                x = (Math.random()-0.5)*12; y = Math.random()*80; z = (Math.random()-0.5)*12;
                r=1; g=0.9; b=0.4;
            }
            states[idx].pos.push(x, y, z); states[idx].col.push(r, g, b);
        }
    }

    function createTextData(idx) {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 65px Arial"; ctx.textAlign = "center";
        ctx.fillText("管老师，生日快乐", 500, 110);
        const data = ctx.getImageData(0,0,1000,200).data;
        const pts = [];
        for(let y=0; y<200; y+=2.5) for(let x=0; x<1000; x+=2.5) {
            if(data[(y*1000+x)*4] > 120) pts.push({x: x-500, y: 100-y});
        }
        for(let i=0; i<particleCount; i++) {
            const p = pts[i % pts.length];
            states[idx].pos.push(p.x, p.y, 0);
            const mix = (p.x + 400) / 800;
            states[idx].col.push(0.5 + mix * 0.5, 0.6, 0.95 - mix * 0.3); 
        }
    }

    // 2. 异步加载图片（不阻塞主流程）
    function loadPersonImage(idx) {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = "person.jpg?v=" + Math.random();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 180; canvas.height = 240;
            let cropW = img.width, cropH = img.width * (4/3);
            if(cropH > img.height) { cropH = img.height; cropW = cropH * (3/4); }
            ctx.drawImage(img, (img.width-cropW)/2, (img.height-cropH)/2, cropW, cropH, 0, 0, 180, 240);
            const data = ctx.getImageData(0, 0, 180, 240).data;
            const temp = [];
            for (let y = 0; y < 240; y++) {
                for (let x = 0; x < 180; x++) {
                    const i = (y * 180 + x) * 4;
                    if (data[i + 3] > 60) {
                        temp.push({x:(x-90)*2.8, y:(120-y)*2.8-20, r:data[i]/255, g:data[i+1]/255, b:data[i+2]/255});
                    }
                }
            }
            for (let i = 0; i < particleCount; i++) {
                const p = temp[i % temp.length];
                states[idx].pos.push(p.x, p.y, (Math.random()-0.5)*10);
                states[idx].col.push(p.r, p.g, p.b);
            }
            console.log("图片粒子化完成");
        };
        img.onerror = () => { createStarData(idx); };
    }

    // 3. 初始化渲染
    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 2000);
        camera.position.z = 500;
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        createStarData(0); 
        createCakeData(1);
        loadPersonImage(2); // 异步加载，不影响 init 运行
        createTextData(3);

        const pos = new Float32Array(states[0].pos);
        const col = new Float32Array(states[0].col);
        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(col, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2.5, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending
        }));
        scene.add(points);

        // 启动交互
        setupEvents();
        animate();
        
        // 5秒后强制关闭加载层（如果还没自动关闭）
        setTimeout(forceHide, 5000);
    }

    function setupEvents() {
        window.addEventListener('click', () => { forceHide(); nextStep(); });

        // 手势识别
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        hands.onResults(res => {
            forceHide();
            if(res.multiHandLandmarks?.length > 0) {
                const hl = res.multiHandLandmarks[0];
                if(Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y) > 0.3 && !window.isT) {
                    window.isT = true; nextStep(); setTimeout(() => window.isT = false, 3000);
                }
            }
        });
        const cam = new Camera(document.getElementById('input-video'), {
            onFrame: async () => { try { await hands.send({image: document.getElementById('input-video')}); } catch(e){} },
            width: 640, height: 480
        });
        cam.start().catch(e => console.log("相机启动失败，点击模式可用"));
    }

    function nextStep() {
        stateIndex = (stateIndex + 1) % 4;
        const target = states[stateIndex];
        if(!target.pos.length) return; // 如果图片还没加载完，先不跳

        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;
        for(let i=0; i<particleCount; i++) {
            gsap.to(posAttr.array, {
                [i*3]: target.pos[i*3], [i*3+1]: target.pos[i*3+1], [i*3+2]: target.pos[i*3+2],
                duration: 2, ease: "power2.inOut", delay: Math.random()*0.3,
                onUpdate: () => posAttr.needsUpdate = true
            });
            gsap.to(colAttr.array, {
                [i*3]: target.col[i*3], [i*3+1]: target.col[i*3+1], [i*3+2]: target.col[i*3+2],
                duration: 1.5, onUpdate: () => colAttr.needsUpdate = true
            });
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
