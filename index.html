<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给管老师的生日惊喜</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #status-text { color: #ff99cc; margin-top: 20px; font-family: "Microsoft YaHei"; text-align: center; }
        #hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-family: "Microsoft YaHei"; z-index: 50; pointer-events: none; }
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div id="status-text">正在加载魔法资源...<br>请确保摄像头权限已开启</div>
</div>

<div id="hint">手掌张开 或 点击屏幕 切换下一阶段</div>
<video id="input-video" playsinline></video>

<script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
<script src="https://cdn.staticfile.org/gsap/3.9.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 15000; 
    let stateIndex = 0; // 0:星空, 1:蛋糕, 2:人物, 3:祝福语
    
    const states = [
        { pos: [], col: [] }, // 星空
        { pos: [], col: [] }, // 蛋糕
        { pos: [], col: [] }, // 人物
        { pos: [], col: [] }  // 文字
    ];

    async function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
        camera.position.z = 450;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        const initialPos = new Float32Array(particleCount * 3);
        const initialCol = new Float32Array(particleCount * 3);

        createRandomData(0);
        createCakeData(1);
        await createPersonData(2); 
        createTextData(3);

        for(let i=0; i<particleCount; i++) {
            initialPos[i*3] = states[0].pos[i*3];
            initialPos[i*3+1] = states[0].pos[i*3+1];
            initialPos[i*3+2] = states[0].pos[i*3+2];
            initialCol[i*3] = states[0].col[i*3];
            initialCol[i*3+1] = states[0].col[i*3+1];
            initialCol[i*3+2] = states[0].col[i*3+2];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(initialPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(initialCol, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending
        }));
        scene.add(points);

        setupInteraction();
        animate();
    }

    function createRandomData(idx) {
        for(let i=0; i<particleCount; i++) {
            states[idx].pos.push((Math.random()-0.5)*800, (Math.random()-0.5)*800, (Math.random()-0.5)*800);
            states[idx].col.push(0.5, 0.8, 1);
        }
    }

    function createCakeData(idx) {
        for(let i=0; i<particleCount; i++) {
            let x,y,z, r,g,b; const rand = Math.random();
            if(rand < 0.6) {
                const a = Math.random()*Math.PI*2; const rad = Math.random()*(rand<0.3?100:70);
                x = Math.cos(a)*rad; y = rand<0.3? Math.random()*50-80 : Math.random()*40-30; z = Math.sin(a)*rad;
                r=1; g=0.8; b=0.9;
            } else {
                x = (Math.random()-0.5)*10; y = Math.random()*60+20; z = (Math.random()-0.5)*10;
                r=1; g=0.9; b=0.3;
            }
            states[idx].pos.push(x, y, z);
            states[idx].col.push(r, g, b);
        }
    }

    function createPersonData(idx) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "person.jpg"; 

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxSide = 130; 
                const ratio = img.width / img.height;
                let canvasW = img.width > img.height ? maxSide : maxSide * ratio;
                let canvasH = img.width > img.height ? maxSide / ratio : maxSide;
                
                canvas.width = canvasW;
                canvas.height = canvasH;
                ctx.drawImage(img, 0, 0, canvasW, canvasH);
                const imageData = ctx.getImageData(0, 0, canvasW, canvasH).data;
                const temp = [];

                // 强制中心适配比例
                const scale = 1.2; 
                for (let y = 0; y < canvasH; y++) {
                    for (let x = 0; x < canvasW; x++) {
                        const i = (y * canvasW + x) * 4;
                        if (imageData[i + 3] > 70) { 
                            temp.push({
                                x: (x - canvasW / 2) * scale, 
                                // 向上偏移 +50 确保底部露出
                                y: (canvasH / 2 - y) * scale + 50, 
                                r: imageData[i] / 255, 
                                g: imageData[i + 1] / 255, 
                                b: imageData[i + 2] / 255
                            });
                        }
                    }
                }

                for (let i = 0; i < particleCount; i++) {
                    const p = temp[i % temp.length];
                    states[idx].pos.push(p.x, p.y, (Math.random() - 0.5) * 5);
                    states[idx].col.push(p.r, p.g, p.b);
                }
                resolve();
            };
            img.onerror = () => { createRandomData(idx); resolve(); };
        });
    }

    function createTextData(idx) {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
        ctx.fillText("祝管老师生日快乐！", 500, 100);
        const data = ctx.getImageData(0,0,1000,200).data;
        const pts = [];
        for(let y=0; y<200; y+=2) for(let x=0; x<1000; x+=2) {
            if(data[(y*1000+x)*4] > 128) pts.push(x-500, 100-y, 0);
        }
        for(let i=0; i<particleCount; i++) {
            const pidx = (i % (pts.length/3)) * 3;
            states[idx].pos.push(pts[pidx], pts[pidx+1], pts[pidx+2]);
            states[idx].col.push(1, 1, 1);
        }
    }

    function nextStep() {
        stateIndex = (stateIndex + 1) % 4;
        const target = states[stateIndex];
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;

        for(let i=0; i<particleCount; i++) {
            gsap.to(posAttr.array, {
                [i*3]: target.pos[i*3], [i*3+1]: target.pos[i*3+1], [i*3+2]: target.pos[i*3+2],
                duration: 2, ease: "expo.out", delay: Math.random()*0.3,
                onUpdate: () => posAttr.needsUpdate = true
            });
            gsap.to(colAttr.array, {
                [i*3]: target.col[i*3], [i*3+1]: target.col[i*3+1], [i*3+2]: target.col[i*3+2],
                duration: 1.5, onUpdate: () => colAttr.needsUpdate = true
            });
        }
    }

    function setupInteraction() {
        window.addEventListener('click', nextStep);
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        hands.onResults(res => {
            document.getElementById('loading-screen').style.display = 'none';
            if(res.multiHandLandmarks?.length > 0) {
                const hl = res.multiHandLandmarks[0];
                const dist = Math.hypot(hl[8].x - hl[4].x, hl[8].y - hl[4].y);
                if(dist > 0.25) { 
                    if(!window.isTransitioning) {
                        window.isTransitioning = true;
                        nextStep();
                        setTimeout(() => window.isTransitioning = false, 2500); 
                    }
                }
            }
        });
        new Camera(document.getElementById('input-video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input-video')}); },
            width: 640, height: 480
        }).start();
    }

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.0015;
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
