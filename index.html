<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给管老师的 3D 魔法惊喜</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #loading-hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff99cc; font-family: "Microsoft YaHei", Arial; text-align: center;
            z-index: 100; transition: opacity 0.5s; pointer-events: none;
            text-shadow: 0 0 10px rgba(255,153,204,0.8);
        }
        #bottom-tips {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 14px; font-family: Arial; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="loading-hint">
    ✨ 生日魔法正在汇聚...<br>请点击屏幕开启
</div>
<div id="bottom-tips">点击屏幕：星空 → 蛋糕 → 管老师 ✨ → 祝福</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 20000; // 增加粒子数量，让图像更细腻
    
    // 状态坐标容器
    const states = [
        { pos: [], col: [] }, // 0: 星空
        { pos: [], col: [] }, // 1: 3D蛋糕
        { pos: [], col: [] }, // 2: 3:4 精准人物 (戴皇冠比V)
        { pos: [], col: [] }  // 3: 祝福文字
    ];
    let stateIndex = 0; 
    let randomPos = []; // 初始星空坐标

    async function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 400; // 相机略拉近，让画面占比更大

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 优化移动端视网膜屏显示
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        const initialPos = new Float32Array(particleCount * 3);
        const initialCol = new Float32Array(particleCount * 3);

        // --- 核心：处理人像照片 (3:4 比例截取全身) ---
        await createPersonData(2);
        createRandomData(0);
        createCakeData(1);
        createTextData(3);

        // 初始显示为星空
        for(let i=0; i<particleCount; i++) {
            initialPos[i*3] = states[0].pos[i*3];
            initialPos[i*3+1] = states[0].pos[i*3+1];
            initialPos[i*3+2] = states[0].pos[i*3+2];
            initialCol[i*3] = states[0].col[i*3];
            initialCol[i*3+1] = states[0].col[i*3+1];
            initialCol[i*3+2] = states[0].col[i*3+2];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(initialPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(initialCol, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
        }));
        scene.add(points);

        animate();
    }

    function createRandomData(idx) {
        for(let i=0; i<particleCount; i++) {
            states[idx].pos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            states[idx].col.push(0.5, 0.8, 1);
        }
    }

    function createCakeData(idx) {
        for(let i=0; i<particleCount; i++) {
            let x,y,z; const rand = Math.random();
            if(rand < 0.6) { // 糕体
                const a = Math.random()*Math.PI*2; const rad = Math.random()*(rand<0.3?110:80);
                x = Math.cos(a)*rad; y = rand<0.3? Math.random()*50-100 : Math.random()*40-40; z = Math.sin(a)*rad;
            } else { // 蜡烛
                x = (Math.random()-0.5)*15; y = Math.random()*60+30; z = (Math.random()-0.5)*15;
            }
            states[idx].pos.push(x, y, z);
            states[idx].col.push(1, 0.8, 0.9);
        }
    }

    // --- [核心修改] 3:4 比例精准截取人像全身 ---
    function createPersonData(idx) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "person.jpg"; 

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 1. 设定采样画布为严格 3:4 比例 (例如 180x240)
                const targetW = 180;
                const targetH = 240; // 严格的 3:4
                canvas.width = targetW;
                canvas.height = targetH;
                
                // 2. 核心算法：中心 3:4 裁切 (CROP)
                // 这将自动截取照片正中心比 V 女士的全身区域
                let minSide = Math.min(img.width, img.height);
                let cropW, cropH;
                
                if (img.width / img.height > targetW / targetH) {
                    // 图片太宽，截取中间高度全覆盖的正方形
                    cropH = img.height;
                    cropW = cropH * (targetW / targetH);
                } else {
                    // 图片太高，截取中间宽度全覆盖的正方形
                    cropW = img.width;
                    cropH = cropW * (targetH / targetW);
                }
                
                let sx = (img.width - cropW) / 2;
                let sy = (img.height - cropH) / 2;
                ctx.drawImage(img, sx, sy, cropW, cropH, 0, 0, targetW, targetH);
                
                const data = ctx.getImageData(0, 0, targetW, targetH).data;
                const temp = [];
                // 放大倍数设为 2.8，确保人像在手机屏幕上占比非常大
                const scale = 2.8; 

                for (let y = 0; y < targetH; y++) {
                    for (let x = 0; x < targetW; x++) {
                        const i = (y * targetW + x) * 4;
                        const alpha = data[i+3];
                        // 过滤算法：只要不完全透明，且不是全黑背景，就采样
                        if (alpha > 80) { 
                            temp.push({
                                // 坐标归零居中计算
                                x: (x - targetW / 2) * scale, 
                                // Y轴向上，图片向下移动 -30，调整视觉中心
                                y: (targetH / 2 - y) * scale - 30, 
                                r: data[i] / 255, 
                                g: data[i+1] / 255, 
                                b: data[i+2] / 255
                            });
                        }
                    }
                }

                // 将照片像素分配给全局粒子
                for (let i = 0; i < particleCount; i++) {
                    const p = temp[i % temp.length];
                    states[idx].pos.push(p.x, p.y, (Math.random() - 0.5) * 8);
                    states[idx].col.push(p.r, p.g, p.b);
                }
                console.log("3:4 人物全图适配完成");
                resolve();
            };
            img.onerror = () => { createRandomData(idx); resolve(); };
        });
    }

    function createTextData(idx) {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
        ctx.fillText("祝管老师天天开心，生日快乐！", 500, 100);
        const data = ctx.getImageData(0,0,1000,200).data;
        const pts = [];
        for(let y=0; y<200; y+=3) for(let x=0; x<1000; x+=3) {
            if(data[(y*1000+x)*4] > 120) pts.push(x-500, 100-y, 0);
        }
        for(let i=0; i<particleCount; i++) {
            const pidx = (i % (pts.length/3)) * 3;
            states[idx].pos.push(pts[pidx], pts[pidx+1], pts[pidx+2]);
            states[idx].col.push(1, 1, 1);
        }
    }

    // --- 核心切换逻辑 ---
    window.addEventListener('click', () => {
        // 隐藏点击提示
        document.getElementById('loading-hint').style.opacity = 0;
        
        stateIndex = (stateIndex + 1) % 4;
        const target = states[stateIndex];
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;

        for(let i=0; i<particleCount; i++) {
            gsap.to(posAttr.array, {
                [i*3]: target.pos[i*3], [i*3+1]: target.pos[i*3+1], [i*3+2]: target.pos[i*3+2],
                duration: 2, ease: "expo.out", delay: Math.random()*0.4,
                onUpdate: () => posAttr.needsUpdate = true
            });
            gsap.to(colAttr.array, {
                [i*3]: target.col[i*3], [i*3+1]: target.col[i*3+1], [i*3+2]: target.col[i*3+2],
                duration: 1.5, onUpdate: () => colAttr.needsUpdate = true
            });
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.0012;
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
