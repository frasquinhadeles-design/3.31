<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给管老师的生日惊喜</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #gui-hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff99cc; font-family: "Microsoft YaHei"; text-align: center;
            z-index: 100; pointer-events: none; transition: opacity 0.5s;
            text-shadow: 0 0 10px rgba(255,153,204,0.8);
        }
        #bottom-tips {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="gui-hint">✨ 这里的星空藏着惊喜<br>请点击屏幕开启</div>
<div id="bottom-tips">点击屏幕：星空 → 蛋糕 → 祝福文字</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 15000;
    let cakePos = [], textPos = [], randomPos = [];
    let state = 0; // 0:星空, 1:蛋糕, 2:文字

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 400;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 800;
            positions[i*3+1] = (Math.random() - 0.5) * 800;
            positions[i*3+2] = (Math.random() - 0.5) * 800;
            randomPos.push(positions[i*3], positions[i*3+1], positions[i*3+2]);
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            size: 2, color: 0xffffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
        });
        points = new THREE.Points(geometry, material);
        scene.add(points);

        createCakeCoords();
        createTextCoords();
        animate();
    }

    function createCakeCoords() {
        for (let i = 0; i < particleCount; i++) {
            let x, y, z;
            const r = Math.random();
            if (r < 0.5) { // 底层圆柱
                const a = Math.random() * Math.PI * 2;
                const rad = Math.random() * 100;
                x = Math.cos(a) * rad; y = Math.random() * 60 - 80; z = Math.sin(a) * rad;
            } else if (r < 0.85) { // 上层圆柱
                const a = Math.random() * Math.PI * 2;
                const rad = Math.random() * 70;
                x = Math.cos(a) * rad; y = Math.random() * 50 - 20; z = Math.sin(a) * rad;
            } else { // 蜡烛
                x = (Math.random() - 0.5) * 10; y = Math.random() * 50 + 30; z = (Math.random() - 0.5) * 10;
            }
            cakePos.push(x, y, z);
        }
    }

    function createTextCoords() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 200;
        ctx.fillStyle = "white";
        ctx.font = "bold 50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("祝管老师生日快乐！", 400, 100);
        const data = ctx.getImageData(0,0,800,200).data;
        const temp = [];
        for(let y=0; y<200; y+=3) for(let x=0; x<800; x+=3) {
            if(data[(y*800+x)*4] > 128) temp.push(x-400, 100-y, 0);
        }
        for(let i=0; i<particleCount; i++) {
            const idx = (i % (temp.length/3)) * 3;
            textPos.push(temp[idx], temp[idx+1], temp[idx+2]);
        }
    }

    function transform(target) {
        const current = geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            gsap.to(current, {
                [i*3]: target[i*3], [i*3+1]: target[i*3+1], [i*3+2]: target[i*3+2],
                duration: 1.5, ease: "power2.out", delay: Math.random() * 0.3,
                onUpdate: () => geometry.attributes.position.needsUpdate = true
            });
        }
    }

    window.addEventListener('click', () => {
        document.getElementById('gui-hint').style.opacity = 0;
        state++;
        if (state === 1) transform(cakePos);
        if (state === 2) transform(textPos);
        if (state === 3) { transform(randomPos); state = 0; }
    });

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    init();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
