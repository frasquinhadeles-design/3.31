<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给管老师的生日惊喜 v14.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-tap-highlight-color: transparent; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #status-text { color: #ff99cc; margin-top: 20px; font-family: "Microsoft YaHei", sans-serif; text-align: center; font-size: 14px; padding: 0 20px; }
        #hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-family: "Microsoft YaHei"; z-index: 50; pointer-events: none; }
        #input-video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; visibility: hidden; }
    </style>
</head>
<body>

<div id="loading-screen" onclick="activateMagic()">
    <div style="border: 3px solid #333; border-top: 3px solid #ff99cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <div id="status-text">✨ 魔法正在同步到全设备...<br>请点击屏幕【开启惊喜】</div>
</div>
<style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

<div id="hint">张开手掌触发魔法 | 或点击屏幕</div>
<video id="input-video" playsinline muted autoplay webkit-playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.9.1/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, points, geometry;
    const particleCount = 20000; 
    let stateIndex = 0; 
    window.isT = false; 
    const states = [{pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}, {pos:[], col:[]}];

    // --- 核心：Safari/安卓 兼容性激活函数 ---
    function activateMagic() {
        const video = document.getElementById('input-video');
        video.play(); // 必须在用户点击事件中调用
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        
        // 尝试启动手势识别
        startCamera();
    }

    async function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 2000);
        camera.position.z = 500;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        createStarData(0); 
        createLuxCakeData(1);   
        await loadPerson34Strict(2); 
        createSingleText(3);   

        const initialPos = new Float32Array(states[0].pos);
        const initialCol = new Float32Array(states[0].col);
        geometry.setAttribute('position', new THREE.BufferAttribute(initialPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(initialCol, 3));

        points = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 2.4, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending
        }));
        scene.add(points);

        window.addEventListener('click', nextStep);
        animate();
    }

    // 0. 星空
    function createStarData(idx) {
        for(let i=0; i<particleCount; i++) {
            states[idx].pos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            states[idx].col.push(0.4, 0.7, 1);
        }
    }

    // 1. 豪华双层蛋糕
    function createLuxCakeData(idx) {
        for(let i=0; i<particleCount; i++) {
            let x,y,z, r,g,b; const rand = Math.random();
            if(rand < 0.4) { 
                const a = Math.random()*Math.PI*2; const rad = Math.random()*115;
                x = Math.cos(a)*rad; y = Math.random()*50-110; z = Math.sin(a)*rad;
                r=0.98; g=0.95; b=0.98;
            } else if(rand < 0.7) { 
                const a = Math.random()*Math.PI*2; const rad = Math.random()*80;
                x = Math.cos(a)*rad; y = Math.random()*45-45; z = Math.sin(a)*rad;
                r=1; g=0.75; b=0.85;
            } else { 
                x = (Math.random()-0.5)*12; y = Math.random()*75+20; z = (Math.random()-0.5)*12;
                r=1; g=0.5; b=0.2;
            }
            states[idx].pos.push(x, y, z); states[idx].col.push(r, g, b);
        }
    }

    // 2. 强制 3:4 竖版人物
    function loadPerson34Strict(idx) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "person.jpg?v=" + Date.now();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const sw = 150, sh = 200; 
                canvas.width = sw; canvas.height = sh;
                let iw = img.width, ih = img.height;
                let aspect = 0.75;
                let cw = iw, ch = ih;
                if (iw / ih > aspect) { cw = ih * aspect; } else { ch = iw / aspect; }
                ctx.drawImage(img, (iw-cw)/2, (ih-ch)/2, cw, ch, 0, 0, sw, sh);
                const data = ctx.getImageData(0, 0, sw, sh).data;
                const temp = [];
                const zoom = 2.8; 
                for (let y = 0; y < sh; y++) {
                    for (let x = 0; x < sw; x++) {
                        const i = (y * sw + x) * 4;
                        if (data[i+3] > 60) {
                            temp.push({x: (x - sw/2) * zoom, y: (sh/2 - y) * zoom - 30, r: data[i]/255, g: data[i+1]/255, b: data[i+2]/255});
                        }
                    }
                }
                for (let i = 0; i < particleCount; i++) {
                    const p = temp[i % temp.length];
                    states[idx].pos.push(p.x, p.y, (Math.random()-0.5)*10);
                    states[idx].col.push(p.r, p.g, p.b);
                }
                resolve();
            };
            img.onerror = () => { createStarData(idx); resolve(); };
        });
    }

    // 3. 蓝粉渐变文字
    function createSingleText(idx) {
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 200;
        ctx.fillStyle = "white"; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
        ctx.fillText("管老师，生日快乐", 300, 110);
        const data = ctx.getImageData(0,0,600,200).data;
        const pts = [];
        for(let y=0; y<200; y+=2.2) for(let x=0; x<600; x+=2.2) {
            if(data[(y*600+x)*4] > 120) pts.push({x: x-300, y: 100-y});
        }
        for(let i=0; i<particleCount; i++) {
            const p = pts[i % pts.length];
            states[idx].pos.push(p.x * 1.3, p.y * 1.3, 0);
            const ratio = (p.x + 250) / 500;
            states[idx].col.push(0.4 + ratio * 0.6, 0.6, 0.9 - ratio * 0.2); 
        }
    }

    function nextStep() {
        stateIndex = (stateIndex + 1) % 4;
        const target = states[stateIndex];
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;
        for(let i=0; i<particleCount; i++) {
            gsap.to(posAttr.array, {
                [i*3]: target.pos[i*3], [i*3+1]: target.pos[i*3+1], [i*3+2]: target.pos[i*3+2],
                duration: 2, ease: "power3.inOut", delay: Math.random()*0.3,
                onUpdate: () => posAttr.needsUpdate = true
            });
            gsap.to(colAttr.array, {
                [i*3]: target.col[i*3], [i*3+1]: target.col[i*3+1], [i*3+2]: target.col[i*3+2],
                duration: 1.5, onUpdate: () => colAttr.needsUpdate = true
            });
        }
    }

    // --- 核心：全兼容相机启动逻辑 ---
    function startCamera() {
        const video = document.getElementById('input-video');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const dx = landmarks[12].x - landmarks[0].x;
                const dy = landmarks[12].y - landmarks[0].y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance > 0.35 && !window.isT) {
                    window.isT = true;
                    nextStep();
                    setTimeout(() => { window.isT = false; }, 3000); 
                }
            }
        });

        const cam = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 640,
            height: 480
        });

        cam.start().catch(err => {
            console.log("相机自动启动受限，已激活点击模式保底");
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.0012;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
